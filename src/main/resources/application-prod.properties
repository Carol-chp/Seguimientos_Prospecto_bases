# ============================================================
# Perfil PROD — todos los valores sensibles DEBEN venir por variable de entorno.
# Activa con: SPRING_PROFILES_ACTIVE=prod  (o -Dspring.profiles.active=prod)
#
# TODO: antes del primer deploy en produccion, configurar todas las variables
# de entorno documentadas en .env.example. El arranque fallara si faltan.
# ============================================================

# --- Datasource (OBLIGATORIO por env) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# --- JWT (OBLIGATORIO por env — minimo 32 caracteres) ---
app.jwt.secret=${JWT_SECRET}

# --- CORS (OBLIGATORIO por env — URL real del frontend en produccion) ---
# TODO: reemplazar con la URL del frontend desplegado, ej: https://app.midominio.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- Email (OBLIGATORIO por env cuando se active en Fase 1) ---
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=${MAIL_USERNAME}
# spring.mail.password=${MAIL_APP_PASSWORD}

# --- Logs (minimo en produccion) ---
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.jdbc.core=WARN
logging.level.root=INFO

# --- Flyway ---
spring.flyway.out-of-order=false
