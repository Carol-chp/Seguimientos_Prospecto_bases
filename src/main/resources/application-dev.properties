# ============================================================
# Perfil DEV — solo para desarrollo local. NO commitear con secretos reales.
# Activa con: -Dspring.profiles.active=dev  o  SPRING_PROFILES_ACTIVE=dev
# ============================================================

# --- Datasource local ---
spring.datasource.url=jdbc:postgresql://localhost:5432/seguimiento_prospectos
spring.datasource.username=postgres
spring.datasource.password=123456

# --- JWT (dev only — NO usar en produccion) ---
app.jwt.secret=dev-only-secret-do-NOT-use-in-production-at-least-32-chars!

# --- CORS dev ---
app.cors.allowed-origins=http://localhost:4200

# --- Logs Hibernate (DEBUG en dev para ver queries) ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

# --- Flyway verbose en dev ---
spring.flyway.out-of-order=false
