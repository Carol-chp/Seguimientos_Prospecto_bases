# ============================================================
# Configuracion base — valida en todos los perfiles.
# Los valores sensibles se sobreescriben en application-dev.properties
# o en application-prod.properties (via variables de entorno).
# Perfil activo: spring.profiles.active en cada entorno o -Dspring.profiles.active=dev|prod
# ============================================================

server.port=8081

# --- Datasource (sobreescrito por perfil) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/seguimiento_prospectos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# ddl-auto=none: Flyway es el unico responsable del esquema.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# --- JWT ---
app.jwt.secret=${JWT_SECRET:dev-only-secret-must-be-at-least-32-chars-long!}

# --- CORS ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# --- Multipart ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Email (RF-07). Parametrizado por env; DESACTIVADO por defecto.
#     Para activar: MAIL_ENABLED=true + MAIL_USERNAME + MAIL_APP_PASSWORD
#     (Gmail con 2FA → App Password en https://myaccount.google.com/apppasswords).
#     Mientras app.mail.enabled=false, el sistema funciona normal pero NO envía
#     (el resumen 9pm se "salta" con motivo registrado).
app.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Hora del resumen diario (cron Spring) y zona
app.mail.resumen-cron=${MAIL_RESUMEN_CRON:0 0 21 * * *}
app.mail.zona=America/Lima

# --- Observabilidad / Actuator (3.5) ---
# Exposicion minima: health, info, metrics. Probes (liveness/readiness) habilitados.
# Detalle de health solo cuando esta autorizado (no filtrar internals al publico).
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
# El correo es una feature opcional y gated (app.mail.enabled); su indicador
# no debe tumbar el health global (DB es la dependencia requerida real).
management.health.mail.enabled=false
management.info.env.enabled=true
info.app.name=Prospectos
info.app.descripcion=Sistema de Seguimiento de Prospectos

# --- Spring Security (no usar spring.security.enabled — no es una propiedad valida en Boot 3) ---
# La seguridad se configura en SecurityConfig.java
# Nota: /actuator/health y /actuator/health/** se exponen publicos en SecurityConfig
# (liveness/readiness para CI/orquestador); el resto de actuator queda protegido.
