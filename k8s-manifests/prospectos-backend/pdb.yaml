apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: prospectos-backend-pdb
  namespace: backend-ns
  labels:
    app: prospectos-backend-app
spec:
  # Con 1 réplica, minAvailable:1 bloquearía drenajes de nodo. En pruebas
  # usamos maxUnavailable:1 para no bloquear mantenimiento del clúster.
  maxUnavailable: 1
  selector:
    matchLabels:
      app: prospectos-backend-app
